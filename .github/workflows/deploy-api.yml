name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'Bakerys.API/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Bakerys.API/API/API.csproj

      - name: Build
        run: dotnet build Bakerys.API/API/API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Bakerys.API/API/API.csproj --configuration Release --no-build --output ./publish-api

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-davids-bakery
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish-api
